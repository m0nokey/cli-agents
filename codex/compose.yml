services:
  codex:
    build:
      context: ${CODEX_RUNNER_DIR}
      dockerfile: Dockerfile
    image: ${CODEX_IMAGE_NAME:-local/codex-rust:latest}
    stdin_open: true
    tty: true
    init: true
    read_only: true
    pids_limit: 100
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    dns:
      - 1.1.1.1
      - 9.9.9.9
    dns_search: []
    security_opt:
      - seccomp=./seccomp-bwrap.json
    cap_drop:
      - ALL
    logging:
      driver: "none"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /home/codex/.cache:rw,nosuid,nodev,size=256m
      - /home/codex/.config:rw,nosuid,nodev,size=64m
    environment:
      HOME: /home/codex
      TERM: xterm-256color
      COLORTERM: truecolor
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - ${CODEX_WORKSPACE_DIR}:/workspace
      - ${CODEX_STATE_DIR}:/home/codex/.codex
      - ${CODEX_SSH_DIR}:/home/codex/.ssh:ro
      - ${CODEX_SECRETS_DIR}:/run/agent-secrets:ro
    working_dir: /workspace
