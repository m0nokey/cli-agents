services:
  gemini:
    build:
      context: ${GEMINI_RUNNER_DIR}
      dockerfile: Dockerfile
    image: ${GEMINI_IMAGE_NAME:-local/gemini-cli:latest}
    stdin_open: true
    tty: true
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "none"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
    environment:
      HOME: /home/gemini
      TERM: xterm-256color
      COLORTERM: truecolor
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-}
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - ${GEMINI_WORKSPACE_DIR}:/workspace
      - ${GEMINI_STATE_DIR}:/home/gemini/.gemini
    working_dir: /workspace
