services:
  gemini:
    build:
      context: ${GEMINI_RUNNER_DIR}
      dockerfile: Dockerfile
    image: ${GEMINI_IMAGE_NAME:-local/gemini-cli:latest}
    hostname: gemini-cli
    stdin_open: true
    tty: true
    init: true
    read_only: true
    pids_limit: 100
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    dns:
      - 1.1.1.1
      - 9.9.9.9
    dns_search: []
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: "none"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /home/gemini/.cache:rw,nosuid,nodev,size=256m
      - /home/gemini/.config:rw,nosuid,nodev,size=64m
    environment:
      HOME: /home/gemini
      TERM: xterm-256color
      COLORTERM: truecolor
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      # Force file-backed OAuth storage; keytar/keychain is unreliable in containers.
      GEMINI_FORCE_FILE_STORAGE: "true"
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-}
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - ${GEMINI_WORKSPACE_DIR}:/workspace
      - ${GEMINI_STATE_DIR}:/home/gemini/.gemini
      - ${GEMINI_SSH_DIR}:/home/gemini/.ssh:ro
      - ${GEMINI_SECRETS_DIR}:/run/agent-secrets:ro
    working_dir: /workspace
